name: 🚀 Build & Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/apoorvs549-lang/legal-dash

jobs:
  # ─────────────────────────────────────────────────
  # JOB 1: Build Docker images on GitHub's fast servers
  # ─────────────────────────────────────────────────
  build:
    name: 🔨 Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          dockerfile: ./server/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest
          build-args: |
            VITE_API_URL=http://13.63.65.240:3000

  # ─────────────────────────────────────────────────
  # JOB 2: Pull pre-built images and restart on EC2
  # ─────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build   # only runs after build succeeds

    steps:
      - name: SSH into EC2, pull images & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "🔑 Logging into GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "⬇️  Pulling latest pre-built images..."
            docker pull ${{ env.IMAGE_PREFIX }}-backend:latest
            docker pull ${{ env.IMAGE_PREFIX }}-frontend:latest

            echo "📁 Going to project directory..."
            cd ~/reactdashboard
            git pull origin main

            echo "🔄 Restarting containers with new images..."
            docker-compose down
            docker-compose up -d

            echo "✅ Deployed! Running containers:"
            docker-compose ps

