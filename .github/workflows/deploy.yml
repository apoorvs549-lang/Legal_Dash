name: 🚀 Deploy to AWS EC2

on:
  push:
    branches: [main]   # Triggers automatically on every push to main
  workflow_dispatch:   # Also allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: SSH & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "📁 Moving to project directory..."
            cd ~/reactdashboard

            echo "⬇️  Pulling latest code from GitHub..."
            git pull origin main

            echo "🔨 Stopping old containers..."
            docker-compose down

            echo "🔨 Rebuilding images (no cache to pick up latest code)..."
            docker-compose build --no-cache

            echo "🚀 Starting containers..."
            docker-compose up -d

            echo "✅ Deploy complete! Containers running:"
            docker-compose ps
