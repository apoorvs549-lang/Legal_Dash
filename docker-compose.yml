version: "3.9"

services:

  # ─────────────────────────────────────────────────
  # SERVICE 1: PostgreSQL Database
  # ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: reactdash_db
    restart: always
    environment:
      POSTGRES_DB: database_dash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: apoorv123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────
  # SERVICE 2: Fastify Backend Server
  # ─────────────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: reactdash_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_NAME: database_dash
      DB_USER: postgres
      DB_PASSWORD: apoorv123
      DB_HOST: db
      DB_PORT: 5432
      PORT: 3000
      HOST: 0.0.0.0
      JWT_SECRET: super_secret_key_change_in_production_2026
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://13.63.65.240
    volumes:
      - ./server/uploads:/usr/src/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────────────
  # SERVICE 3: React Frontend (Nginx)
  # ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://13.63.65.240:3000
    container_name: reactdash_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

# ─────────────────────────────────────────────────
# VOLUMES: Persistent storage for the database
# ─────────────────────────────────────────────────
volumes:
  pgdata:
